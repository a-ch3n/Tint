<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Jou Tints Admin</title>
<link rel="icon" type="image/jpeg" href="/assets/logo.jpg">
<link rel="stylesheet" href="/styles.css">
<style>
  body { padding: 0; }
  .admin-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    background: rgba(10,10,10,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .admin-nav__brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 0.08em;
  }
  .admin-nav__brand img {
    width: 40px; height: 40px;
    border-radius: 4px;
    object-fit: contain;
  }
  .admin-nav__brand .tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--red);
    background: rgba(214,19,43,0.1);
    padding: 3px 8px;
    border-radius: 2px;
  }
  .admin-nav__actions {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .admin-nav__actions a, .admin-nav__actions button {
    font-family: var(--narrow);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 18px;
    background: transparent;
    color: var(--bone);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: all 0.2s;
  }
  .admin-nav__actions a:hover, .admin-nav__actions button:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .admin-nav__actions form { display: inline; }

  .admin-main {
    padding: 32px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .filter {
    background: var(--carbon);
    color: var(--bone);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 12px 20px;
    font-family: var(--narrow);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .filter:hover { border-color: var(--red); }
  .filter.active { background: var(--red); border-color: var(--red); }
  .filter .count {
    background: rgba(0,0,0,0.3);
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .quotes {
    display: grid;
    gap: 12px;
  }
  .quote {
    background: var(--carbon);
    border-left: 3px solid var(--red);
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    transition: transform 0.2s;
  }
  .quote--contacted { border-left-color: #d4a017; opacity: 0.85; }
  .quote--closed { border-left-color: #2a2a2a; opacity: 0.55; }
  .quote:hover { transform: translateX(4px); }

  .quote__head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .quote__name {
    font-family: var(--display);
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .quote__date {
    font-family: var(--mono);
    font-size: 11px;
    color: rgba(237,237,234,0.5);
    letter-spacing: 0.15em;
  }
  .quote__status {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: rgba(214,19,43,0.2);
    color: var(--red);
    border-radius: 2px;
  }
  .quote__status--contacted { background: rgba(212,160,23,0.2); color: #d4a017; }
  .quote__status--closed { background: rgba(255,255,255,0.05); color: rgba(237,237,234,0.4); }

  .quote__grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 12px;
  }
  .quote__field {
    font-family: var(--sans);
  }
  .quote__field .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(237,237,234,0.4);
    margin-bottom: 4px;
  }
  .quote__field .value {
    font-size: 14px;
    color: var(--bone);
    word-break: break-word;
  }
  .quote__field a { color: var(--red); }

  .quote__message {
    background: rgba(0,0,0,0.3);
    padding: 14px 16px;
    border-radius: 2px;
    font-size: 13px;
    color: rgba(237,237,234,0.85);
    line-height: 1.6;
    margin-top: 8px;
  }

  .quote__actions {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 140px;
  }
  .quote__actions button {
    background: transparent;
    color: var(--bone);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 14px;
    font-family: var(--narrow);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .quote__actions button:hover {
    border-color: var(--red);
    color: var(--red);
  }
  .quote__actions button.danger:hover {
    border-color: var(--red);
    background: var(--red);
    color: var(--bone);
  }

  .empty {
    text-align: center;
    padding: 80px 32px;
    color: rgba(237,237,234,0.4);
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  @media (max-width: 700px) {
    .quote { grid-template-columns: 1fr; }
    .admin-nav { padding: 14px 18px; flex-wrap: wrap; gap: 12px; }
    .admin-main { padding: 18px; }
  }
</style>
</head>
<body>

<nav class="admin-nav">
  <div class="admin-nav__brand">
    <img src="/assets/logo.jpg" alt="Jou Tints">
    <span>JOU TINTS</span>
    <span class="tag">ADMIN</span>
  </div>
  <div class="admin-nav__actions">
    <a href="/api/admin/export">Export CSV</a>
    <a href="/" target="_blank">View Site ↗</a>
    <form method="POST" action="/api/admin/logout">
      <button type="submit">Log Out</button>
    </form>
  </div>
</nav>

<main class="admin-main">
  <div class="filters" id="filters">
    <button class="filter active" data-status="">All <span class="count" id="count-all">0</span></button>
    <button class="filter" data-status="new">New <span class="count" id="count-new">0</span></button>
    <button class="filter" data-status="contacted">Contacted <span class="count" id="count-contacted">0</span></button>
    <button class="filter" data-status="closed">Closed <span class="count" id="count-closed">0</span></button>
  </div>

  <div class="quotes" id="quotes">
    <div class="empty">Loading…</div>
  </div>
</main>

<script>
  let currentFilter = '';

  async function load() {
    const url = '/api/admin/quotes' + (currentFilter ? `?status=${currentFilter}` : '');
    const res = await fetch(url);
    if (res.status === 401) {
      window.location.href = '/admin/login';
      return;
    }
    const { quotes, counts } = await res.json();

    document.getElementById('count-all').textContent = counts.all;
    document.getElementById('count-new').textContent = counts.new;
    document.getElementById('count-contacted').textContent = counts.contacted;
    document.getElementById('count-closed').textContent = counts.closed;

    const list = document.getElementById('quotes');
    if (quotes.length === 0) {
      list.innerHTML = '<div class="empty">No quote requests here yet.</div>';
      return;
    }

    list.innerHTML = quotes.map(q => `
      <div class="quote quote--${q.status}">
        <div>
          <div class="quote__head">
            <div class="quote__name">${escapeHtml(q.name)}</div>
            <div class="quote__date">${formatDate(q.created_at)}</div>
            <div class="quote__status quote__status--${q.status}">${q.status}</div>
          </div>
          <div class="quote__grid">
            ${q.phone ? `<div class="quote__field"><div class="label">Phone</div><div class="value"><a href="tel:${q.phone}">${escapeHtml(q.phone)}</a></div></div>` : ''}
            ${q.email ? `<div class="quote__field"><div class="label">Email</div><div class="value"><a href="mailto:${q.email}">${escapeHtml(q.email)}</a></div></div>` : ''}
            ${q.vehicle ? `<div class="quote__field"><div class="label">Vehicle</div><div class="value">${escapeHtml(q.vehicle)}</div></div>` : ''}
            ${q.package ? `<div class="quote__field"><div class="label">Package</div><div class="value">${escapeHtml(q.package)}</div></div>` : ''}
            ${q.film ? `<div class="quote__field"><div class="label">Film</div><div class="value">${escapeHtml(q.film)}</div></div>` : ''}
            ${q.darkness ? `<div class="quote__field"><div class="label">Darkness</div><div class="value">${escapeHtml(q.darkness)}</div></div>` : ''}
          </div>
          ${q.message ? `<div class="quote__message">${escapeHtml(q.message)}</div>` : ''}
        </div>
        <div class="quote__actions">
          ${q.status !== 'contacted' ? `<button onclick="setStatus(${q.id}, 'contacted')">Mark Contacted</button>` : ''}
          ${q.status !== 'closed' ? `<button onclick="setStatus(${q.id}, 'closed')">Mark Closed</button>` : ''}
          ${q.status !== 'new' ? `<button onclick="setStatus(${q.id}, 'new')">Reopen</button>` : ''}
          <button class="danger" onclick="del(${q.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function setStatus(id, status) {
    await fetch(`/api/admin/quotes?id=${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    load();
  }

  async function del(id) {
    if (!confirm('Delete this quote permanently?')) return;
    await fetch(`/api/admin/quotes?id=${id}`, { method: 'DELETE' });
    load();
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function formatDate(d) {
    const date = new Date(d + 'Z');
    return date.toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }

  document.querySelectorAll('.filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.status;
      load();
    });
  });

  load();
  setInterval(load, 30000); // auto-refresh every 30s
</script>
</body>
</html>
