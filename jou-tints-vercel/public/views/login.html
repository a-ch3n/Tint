<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Jou Tints</title>
<link rel="icon" type="image/jpeg" href="/assets/logo.jpg">
<link rel="stylesheet" href="/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login {
    background: var(--carbon);
    padding: 48px;
    width: 100%;
    max-width: 440px;
    border-left: 3px solid var(--red);
  }
  .login__logo {
    width: 80px; height: 80px;
    margin: 0 auto 24px;
    display: block;
    border-radius: 8px;
    filter: drop-shadow(0 0 30px var(--red-glow));
  }
  .login h1 {
    font-family: var(--display);
    font-size: 36px;
    text-align: center;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .login__sub {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(237,237,234,0.5);
    margin-bottom: 40px;
  }
  .login .field { margin-bottom: 24px; }
  .login button {
    width: 100%;
    background: var(--red);
    color: var(--bone);
    padding: 18px;
    font-family: var(--narrow);
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
    border: none;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.25s;
  }
  .login button:hover { background: var(--bone); color: var(--black); }
  .login__error {
    background: rgba(214,19,43,0.12);
    border-left: 2px solid var(--red);
    padding: 12px 16px;
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
  }
</style>
</head>
<body>
  <div class="login">
    <img src="/assets/logo.jpg" alt="Jou Tints" class="login__logo">
    <h1>Admin</h1>
    <div class="login__sub">Jou Tints · Dashboard</div>

    <div id="error" class="login__error" style="display:none">Invalid credentials. Try again.</div>

    <form method="POST" action="/api/admin/login">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit">Log In →</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
